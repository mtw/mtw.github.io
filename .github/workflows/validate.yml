name: Validate

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  pelican:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r Pelican/requirements.txt

      - name: Build site
        working-directory: Pelican
        run: pelican content -o output -s pelicanconf.py

      - name: Smoke-check generated site
        run: |
          test -f Pelican/output/index.html
          test -f Pelican/output/sitemap.xml
          test -f Pelican/output/robots.txt
          test -d Pelican/output/static
