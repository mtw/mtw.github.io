name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pelican:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r Pelican/requirements.txt

      - name: Build site
        working-directory: Pelican
        run: pelican content -o output -s pelicanconf.py

      - name: Run theme tests
        run: python -m pytest Pelican/pelican-theme/test -q
